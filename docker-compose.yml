version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: topnotch_postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-topnotch}
      POSTGRES_USER: ${DB_USERNAME:-topnotch}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-topnotch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - topnotch

  redis:
    image: redis:7-alpine
    container_name: topnotch_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - topnotch

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: topnotch_app
    working_dir: /var/www
    env_file:
      - ./backend/.env
    volumes:
      - storage_public:/var/www/storage/app/public
      - storage_logs:/var/www/storage/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - topnotch
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://topnotch.apextime.in/api}
    container_name: topnotch_web
    environment:
      - NODE_ENV=production
    depends_on:
      - app
    networks:
      - topnotch
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: topnotch_nginx
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_public:/var/www/public/storage:ro
    depends_on:
      - app
      - web
    networks:
      - topnotch
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: topnotch_worker
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file:
      - ./backend/.env
    volumes:
      - storage_public:/var/www/storage/app/public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - topnotch
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: topnotch_scheduler
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    env_file:
      - ./backend/.env
    volumes:
      - storage_public:/var/www/storage/app/public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - topnotch
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  storage_public:
  storage_logs:

networks:
  topnotch:
    driver: bridge
