# Host-level nginx config for topnotch.apextime.in
# Place at: /etc/nginx/sites-available/topnotch.apextime.in
# Enable with: ln -s /etc/nginx/sites-available/topnotch.apextime.in /etc/nginx/sites-enabled/
# Get SSL cert: certbot --nginx -d topnotch.apextime.in

server {
    listen 80;
    server_name topnotch.apextime.in;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name topnotch.apextime.in;

    ssl_certificate     /etc/letsencrypt/live/topnotch.apextime.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/topnotch.apextime.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to docker nginx on port 8080
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
    }
}
